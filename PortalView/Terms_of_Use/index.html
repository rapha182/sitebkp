<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PortalView - Terms_of_Use - AppRL</title>
<style>
:root{--bg:#091E42;--panel:#0f274f;--border:rgba(121,226,242,.14);--text:#fff;--muted:rgba(255,255,255,.72);--accent:#79E2F2;--accent2:#2684FF}
*{box-sizing:border-box} body{margin:0;font-family:'DM Sans',Arial,sans-serif;background:linear-gradient(180deg,#091E42,#0a1f3e);color:var(--text)}
.wrap{max-width:1100px;margin:0 auto;padding:32px 20px 48px}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.sub{color:var(--muted);line-height:1.6;max-width:780px}
.card{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:18px;padding:24px;margin-top:20px}
.btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.btn{display:inline-block;text-decoration:none;color:#fff;border:1px solid rgba(255,255,255,.16);padding:10px 14px;border-radius:10px}
.btn.primary{background:var(--accent2);border-color:transparent}
.kicker{color:var(--accent);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.note{font-size:14px;color:var(--muted)}
.viewer{width:100%;min-height:75vh;border:none;border-radius:14px;background:#fff}
.callout{background:rgba(38,132,255,.12);border:1px solid rgba(38,132,255,.24);border-radius:14px;padding:16px 18px;margin-top:16px}
code{background:rgba(255,255,255,.08);padding:.15rem .4rem;border-radius:6px}
h1,h2,p{margin:0 0 10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <div class="kicker">AppRL Documentation</div>
      <h1>PortalView - Terms of Use</h1>
      <p class="sub">Documentation page for PortalView.</p>
    </div>
    <div class="btns">
      <a class="btn primary" href="../../">← Back to site</a>
      <a class="btn" href="../">Section home</a>
    </div>
  </div>

  <div class="card">
    <div class="kicker">PDF Viewer</div>
    <p class="note">If the PDF exists in <code>../pdfs/Terms_of_Use.pdf</code>, it will render below. If not, use the direct PDF link.</p>
    <div class="btns">
      <a class="btn" href="../pdfs/Terms_of_Use.pdf" target="_blank">Open PDF directly</a>
    </div>
    <iframe class="viewer" src="../pdfs/Terms_of_Use.pdf"></iframe>
  </div>

</div>
</body>
</html>
